services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: crag_db
      POSTGRES_USER: crag_user
      POSTGRES_PASSWORD: crag_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://crag_user:crag_password@postgres:5432/crag_db
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./frontend/.env
    environment:
      API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "8501:8501"

volumes:
  postgres_data:

